<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>英文聽寫練習機 (V4.0 專業優化版)</title>
    <style>
        /* CSS 樣式維持簡約風 */
        body { font-family: 'Arial', sans-serif; background-color: #f7f7f7; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        #game-container { width: 95%; max-width: 800px; border: 5px solid #a4e2ff; background-color: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; text-align: center; }
        h2 { color: #4a90e2; margin-top: 0; }
        
        #selection-controls { background: #f0f8ff; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        
        .grade-btn { padding: 10px 20px; font-size: 16px; border: 2px solid #4a90e2; border-radius: 10px; cursor: pointer; background: white; }
        .grade-btn.selected { background: #4a90e2; color: white; }
        #review-book-btn { background-color: #fff0f3; border: 2px solid #ffb3c1; color: #d63384; font-weight: bold; width: 100%; max-width: 400px; }
        
        #hint-display { font-size: 22px; font-weight: bold; color: #4a90e2; margin: 20px 0; min-height: 30px; }
        #input-area { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .letter-slot { width: 45px; height: 55px; line-height: 55px; font-size: 30px; font-weight: bold; border: 3px solid #ccc; border-radius: 8px; background: white; }
        .space-slot { width: 20px; height: 55px; }
        
        #keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 10px; }
        .key { background-color: #a4e2ff; border: none; padding: 12px 0; font-size: 22px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #delete-key { background-color: #777; color: white; }
        
        .control-btn { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px #999; margin: 5px; }
        .control-btn:active { box-shadow: 0 0 #999; transform: translateY(4px); }
        #start-btn { background-color: #ff9f43; color: white; }
        #repeat-btn { background-color: #5cb85c; color: white; }
        #check-btn { background-color: #f0ad4e; color: white; }
        #answer-btn { background-color: #5bc0de; color: white; }
        .control-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .correct { background-color: #aaffaa !important; border-color: #4CAF50 !important; }
        .incorrect { background-color: #ffaaaa !important; border-color: #f44336 !important; }
        .skipped { background-color: #ffe4b2 !important; border-color: #ff8c00 !important; }
        #feedback { font-size: 20px; font-weight: bold; margin-top: 10px; color: #d9534f; height: 25px; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>☁️ 英文聽寫練習機 V4.0</h2>
    
    <div id="selection-controls">
        <div class="row">
            <button class="grade-btn" id="btn-G1" onclick="selectGrade('G1')">一年級 G1</button>
            <button class="grade-btn" id="btn-G2" onclick="selectGrade('G2')">二年級 G2</button>
        </div>
        <div class="row" id="range-row" style="display:none;">
            從 <select id="start-unit"></select> 
            到 <select id="end-unit"></select>
        </div>
        <div class="row">
            <button id="review-book-btn" class="grade-btn" onclick="startWrongWordMode()">🎯 挑戰錯題本 (載入中...)</button>
        </div>
    </div>

    <div id="hint-display">請先選擇年級與課別範圍</div>
    <div id="input-area"></div>
    <div id="feedback"></div>

    <div id="controls">
        <button id="start-btn" class="control-btn" onclick="startGame()">開始遊戲</button>
        <button id="repeat-btn" class="control-btn" onclick="readWord(currentWord)" disabled>🔈 唸一遍</button>
        <button id="check-btn" class="control-btn" onclick="checkSpelling()" disabled>✅ 檢查</button>
        <button id="answer-btn" class="control-btn" onclick="showAnswer()" disabled>📖 解答</button>
    </div>

    <div id="keyboard"></div>
</div>

<script>
    // 單字庫 (保持不變)
    const allWordUnits = {
        "G1": { "U1": [{word:"HE IS",hint:"他是"},{word:"I AM",hint:"我是"},{word:"NAME",hint:"名字"},{word:"SHE IS",hint:"她是"},{word:"THE",hint:"這個"},{word:"THIS",hint:"這個"},{word:"YOU ARE",hint:"你是"},{word:"WHAT",hint:"什麼"}], "U2": [{word:"THAT",hint:"那個"},{word:"AND",hint:"和"},{word:"OUR",hint:"我們的"},{word:"HER",hint:"她的"},{word:"HIS",hint:"他的"},{word:"MY",hint:"我的"},{word:"OPEN",hint:"打開"},{word:"YOUR",hint:"你的"},{word:"THEY",hint:"他們"},{word:"CLOSE",hint:"關上"},{word:"WE",hint:"我們"},{word:"THEIR",hint:"他們的"}], "U3": [{word:"SCHOOL",hint:"學校"},{word:"GOOD",hint:"好的"},{word:"FIRST GRADE",hint:"一年級"},{word:"HELLO",hint:"哈囉"},{word:"IN",hint:"在"},{word:"NO",hint:"不"},{word:"NOT",hint:"不"},{word:"TOO",hint:"也是"},{word:"WHO",hint:"誰"},{word:"YES",hint:"是"}], "U4": [{word:"WHITE",hint:"白色"},{word:"ORANGE",hint:"橘色"},{word:"BLACK",hint:"黑色"},{word:"GREEN",hint:"綠色"},{word:"YELLOW",hint:"黃色"},{word:"BLUE",hint:"藍色"},{word:"COLOR",hint:"顏色"},{word:"PINK",hint:"粉紅色"},{word:"RED",hint:"紅色"},{word:"WHOSE",hint:"誰的"}], "U5": [{word:"WHERE",hint:"哪裡"},{word:"GROUP",hint:"組"},{word:"THERE IS",hint:"有 (單數)"},{word:"CLASSROOM",hint:"教室"},{word:"IT",hint:"它"},{word:"THERE ARE",hint:"有 (複數)"},{word:"TELL",hint:"告訴"},{word:"AT",hint:"在於"},{word:"GO",hint:"去"},{word:"ON",hint:"在...上面"}], "U6": [{word:"DRAW",hint:"畫畫"},{word:"READ",hint:"閱讀"},{word:"COUNT",hint:"數數"},{word:"WRITE",hint:"寫"},{word:"CAN",hint:"可以"},{word:"CANT",hint:"不可以"},{word:"CANNOT",hint:"不可以"},{word:"EAT",hint:"吃"},{word:"RUN",hint:"跑"},{word:"SLEEP",hint:"睡覺"}], "U7": [{word:"THESE",hint:"這些"},{word:"THOSE",hint:"那些"},{word:"COME TO",hint:"來"},{word:"TWO",hint:"二"},{word:"WALK TO",hint:"走到"},{word:"BY BUS",hint:"搭公車"},{word:"FOUR",hint:"四"},{word:"HOW",hint:"如何"},{word:"ONE",hint:"一"},{word:"THREE",hint:"三"}], "U8": [{word:"DOES",hint:"做"},{word:"HOMEWORK",hint:"家庭作業"},{word:"DOESNT",hint:"不 (doesn't)"},{word:"KNOW",hint:"知道"},{word:"WITH",hint:"和"},{word:"DONT",hint:"不 (don't)"},{word:"KICK",hint:"踢"},{word:"LETS",hint:"讓我們"},{word:"WANT TO",hint:"想要"},{word:"JUMP",hint:"跳"},{word:"DO",hint:"做"},{word:"PLAY",hint:"玩"}], "U9": [{word:"EIGHT",hint:"八"},{word:"ELEVEN",hint:"十一"},{word:"WHAT TIME",hint:"幾點鐘"},{word:"TWELVE",hint:"十二"},{word:"FIVE",hint:"五"},{word:"FOR",hint:"給"},{word:"NINE",hint:"九"},{word:"SEVEN",hint:"七"},{word:"SIX",hint:"六"},{word:"TEN",hint:"十"}], "U10": [{word:"WINDY",hint:"風大的"},{word:"DRY",hint:"乾的"},{word:"WARM",hint:"溫暖的"},{word:"RAINY",hint:"下雨的"},{word:"COLD",hint:"寒冷的"},{word:"HOT",hint:"炎熱的"},{word:"OR",hint:"或者"},{word:"SUNNY",hint:"晴朗的"},{word:"TODAY",hint:"今天"},{word:"WET",hint:"潮濕的"}] },
        "G2": { "U1": [{word:"FINGER",hint:"手指頭"},{word:"THUMB",hint:"大拇指"},{word:"BODY",hint:"身體"},{word:"TOE",hint:"腳趾"},{word:"LEG",hint:"腿"},{word:"BACK",hint:"背"},{word:"ARM",hint:"手臂"},{word:"HAND",hint:"手"},{word:"FOOT",hint:"腳 (單數)"},{word:"FEET",hint:"腳 (複數)"},{word:"HAVE",hint:"有(I/You/We)"},{word:"HAS",hint:"有(She/He/It)"}], "U2": [{word:"EYE",hint:"眼睛"},{word:"EAR",hint:"耳朵"},{word:"HAIR",hint:"頭髮"},{word:"MOUTH",hint:"嘴巴"},{word:"NOSE",hint:"鼻子"},{word:"BIG",hint:"大的"},{word:"LITTLE",hint:"小的"},{word:"SHORT",hint:"短的"},{word:"LONG",hint:"長的"},{word:"NOW",hint:"現在"}], "U3": [{word:"COAT",hint:"外套"},{word:"SHIRT",hint:"襯衫"},{word:"PANTS",hint:"褲子"},{word:"SHORTS",hint:"短褲"},{word:"SKIRT",hint:"裙子"},{word:"SOCKS",hint:"襪子"},{word:"SHOES",hint:"鞋子"},{word:"DRESS",hint:"洋裝"},{word:"SWEATER",hint:"毛衣"},{word:"GLASSES",hint:"眼鏡"}], "U4": [{word:"TIRED",hint:"疲倦的"},{word:"HAPPY",hint:"快樂的"},{word:"SAD",hint:"悲傷的"},{word:"BORED",hint:"無聊的"},{word:"ANGRY",hint:"生氣的"},{word:"CRAZY",hint:"瘋狂的"},{word:"HUNGRY",hint:"肚子餓的"},{word:"THIRSTY",hint:"口渴的"},{word:"SICK",hint:"生病的"},{word:"SCARED",hint:"害怕的"}], "U5": [{word:"DECEMBER",hint:"十二月"},{word:"MONTH",hint:"月"},{word:"JANUARY",hint:"一月"},{word:"FEBRUARY",hint:"二月"},{word:"MARCH",hint:"三月"},{word:"APRIL",hint:"四月"},{word:"MAY",hint:"五月"},{word:"JUNE",hint:"六月"},{word:"JULY",hint:"七月"},{word:"AUGUST",hint:"八月"},{word:"SEPTEMBER",hint:"九月"},{word:"OCTOBER",hint:"十月"},{word:"NOVEMBER",hint:"十一月"}], "U6": [{word:"BIRTHDAY",hint:"生日"},{word:"GIFT",hint:"禮物"},{word:"THANKS",hint:"謝謝"},{word:"FROM",hint:"從.../來自"},{word:"US",hint:"我們 (受格)"},{word:"COMPUTER",hint:"電腦"},{word:"GAME",hint:"遊戲"},{word:"ME",hint:"我 (受格)"},{word:"YOU",hint:"你(受格)"},{word:"HIM",hint:"他 (受格)"},{word:"THEM",hint:"他們 (受格)"},{word:"TALK",hint:"說話"},{word:"SING",hint:"唱歌"},{word:"SONG",hint:"歌曲"},{word:"STORY",hint:"故事"}], "U7": [{word:"FAMILY",hint:"家庭"},{word:"BROTHER",hint:"兄弟或弟"},{word:"SISTER",hint:"姊姊或妹"},{word:"PEOPLE",hint:"人們(當複數用)"},{word:"FATHER",hint:"父親"},{word:"AUNT",hint:"姑姑或阿姨"},{word:"MOTHER",hint:"母親"},{word:"UNCLE",hint:"伯父或叔叔"},{word:"COUSIN",hint:"堂(表)兄、弟、姊、妹"},{word:"GRANDFATHER",hint:"祖父"},{word:"GRANDMOTHER",hint:"祖母"},{word:"MANY",hint:"很多的"},{word:"BECAUSE",hint:"因為"}], "U8": [{word:"AFRAID",hint:"害怕的"},{word:"PET",hint:"寵物"},{word:"DOG",hint:"狗"},{word:"BUT",hint:"但是"},{word:"LIKE",hint:"喜歡"},{word:"CAT",hint:"貓"},{word:"ANIMAL",hint:"動物"},{word:"HAMSTER",hint:"倉鼠"},{word:"TURTLE",hint:"烏龜"},{word:"SNAKE",hint:"蛇"},{word:"FISH",hint:"魚"},{word:"BIRD",hint:"鳥"},{word:"LIZARD",hint:"蜥蜴"}], "U9": [{word:"KITCHEN",hint:"廚房"},{word:"DOING",hint:"做"},{word:"BEDROOM",hint:"臥室"},{word:"BATHROOM",hint:"浴室"},{word:"DINING ROOM",hint:"飯廳"},{word:"STUDY",hint:"書房"},{word:"LIVING ROOM",hint:"客廳"},{word:"READING",hint:"閱讀"},{word:"COOKING",hint:"煮飯"},{word:"WATCHING",hint:"看"},{word:"TV",hint:"電視"},{word:"SLEEPING",hint:"睡覺"},{word:"EATING",hint:"吃"},{word:"WASHING",hint:"洗"},{word:"WRITING",hint:"寫"}], "U10": [{word:"DESK",hint:"書桌"},{word:"UNDER",hint:"在...下面"},{word:"BED",hint:"床"},{word:"TABLE",hint:"桌子"},{word:"CLOSET",hint:"衣櫥"},{word:"BATHTUB",hint:"浴缸"},{word:"SINK",hint:"水槽"},{word:"CHAIR",hint:"椅子"},{word:"REFRIGERATOR",hint:"冰箱"},{word:"STOVE",hint:"火爐"},{word:"SOFA",hint:"沙發"},{word:"BESIDE",hint:"在...旁邊"},{word:"PUT",hint:"放"}] }
    };

    let currentWord = "", currentSpelling = [], currentWordList = [], wordIndex = 0, errorList = [];
    let isGameActive = false, isReviewMode = false, currentGrade = null;
    const synth = window.speechSynthesis;

    // --- 初始化 UI ---
    function updateWrongWordCount() {
        const book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        document.getElementById('review-book-btn').textContent = `🎯 挑戰錯題本 (目前有 ${book.length} 題)`;
    }

    function selectGrade(grade) {
        currentGrade = grade;
        document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`btn-${grade}`).classList.add('selected');
        
        const units = Object.keys(allWordUnits[grade]);
        const startSel = document.getElementById('start-unit');
        const endSel = document.getElementById('end-unit');
        startSel.innerHTML = endSel.innerHTML = '';
        
        units.forEach((u, index) => {
            startSel.add(new Option(u, u));
            endSel.add(new Option(u, u));
        });
        endSel.selectedIndex = units.length - 1;
        document.getElementById('range-row').style.display = 'flex';
        updateWrongWordCount();
    }

    // --- 遊戲邏輯 ---
    function startGame() {
        if (isGameActive && document.getElementById('start-btn').textContent === '下一個單字') {
            handleSkip(); return;
        }
        
        const startU = document.getElementById('start-unit').value;
        const endU = document.getElementById('end-unit').value;
        const units = Object.keys(allWordUnits[currentGrade]);
        const startIdx = units.indexOf(startU);
        const endIdx = units.indexOf(endU);
        
        if (startIdx > endIdx) { alert("開始課別不能大於結束課別喔！"); return; }

        currentWordList = [];
        for (let i = startIdx; i <= endIdx; i++) {
            currentWordList = currentWordList.concat(allWordUnits[currentGrade][units[i]]);
        }
        currentWordList.sort(() => Math.random() - 0.5);
        wordIndex = 0; errorList = []; isGameActive = true; isReviewMode = false;
        loadNextWord();
    }

    function startWrongWordMode() {
        const book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        if (book.length === 0) { alert("錯題本空空的，好棒！"); return; }
        currentWordList = [...book].sort(() => Math.random() - 0.5);
        wordIndex = 0; errorList = []; isGameActive = true; isReviewMode = true;
        loadNextWord();
    }

    function loadNextWord() {
        if (wordIndex >= currentWordList.length) {
            // 錯題挑戰結束不彈窗複習
            if (isReviewMode) { endGame(); } 
            else { handleRoundEnd(); }
            return;
        }
        const data = currentWordList[wordIndex];
        currentWord = data.word;
        currentSpelling = [];
        document.getElementById('input-area').innerHTML = '';
        document.getElementById('feedback').textContent = '';
        document.getElementById('start-btn').textContent = '下一個單字';
        document.getElementById('start-btn').disabled = false;
        document.getElementById('repeat-btn').disabled = false;
        document.getElementById('answer-btn').disabled = false;
        document.getElementById('check-btn').disabled = true;
        document.getElementById('check-btn').textContent = '✅ 檢查';

        const info = isReviewMode ? "挑戰中" : `${wordIndex+1}/${currentWordList.length}`;
        document.getElementById('hint-display').textContent = `[${info}] ${data.hint}`;

        let lIdx = 0;
        currentWord.split('').forEach(char => {
            if (char === ' ') {
                const s = document.createElement('div'); s.className = 'space-slot';
                document.getElementById('input-area').appendChild(s);
            } else {
                const div = document.createElement('div'); div.className = 'letter-slot'; div.id = `slot-${lIdx++}`;
                document.getElementById('input-area').appendChild(div);
            }
        });
        readWord(currentWord);
    }

    function handleSkip() {
        saveWrongWord(currentWordList[wordIndex]);
        if (!errorList.includes(currentWordList[wordIndex])) errorList.push(currentWordList[wordIndex]);
        wordIndex++;
        loadNextWord();
    }

    function checkSpelling() {
        const player = currentSpelling.join('');
        const target = currentWord.replace(/\s/g, '');
        if (player === target) {
            document.getElementById('feedback').textContent = '🍭 答對了！妳好棒！';
            if (isReviewMode) removeWrongWord(currentWord);
            readWord("Excellent");
            setTimeout(() => { wordIndex++; loadNextWord(); }, 1200);
        } else {
            document.getElementById('feedback').textContent = '💡 好像不對喔，再試試看！';
            saveWrongWord(currentWordList[wordIndex]);
            if (!errorList.includes(currentWordList[wordIndex])) errorList.push(currentWordList[wordIndex]);
            document.getElementById('check-btn').textContent = '🔄 重試';
            document.getElementById('check-btn').onclick = resetInput;
        }
    }

    function resetInput() {
        currentSpelling = [];
        const target = currentWord.replace(/\s/g, '');
        for(let i=0; i<target.length; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.textContent = ''; s.classList.remove('incorrect','correct');
        }
        document.getElementById('check-btn').textContent = '✅ 檢查';
        document.getElementById('check-btn').onclick = checkSpelling;
        document.getElementById('check-btn').disabled = true;
    }

    function showAnswer() {
        const target = currentWord.replace(/\s/g, '');
        for(let i=0; i<target.length; i++) {
            document.getElementById(`slot-${i}`).textContent = target[i];
            document.getElementById(`slot-${i}`).classList.add('skipped');
        }
        saveWrongWord(currentWordList[wordIndex]);
        if (!errorList.includes(currentWordList[wordIndex])) errorList.push(currentWordList[wordIndex]);
        document.getElementById('feedback').textContent = `答案是 ${currentWord}`;
        readWord(currentWord);
        setTimeout(() => { wordIndex++; loadNextWord(); }, 2000);
    }

    function handleRoundEnd() {
        if (errorList.length > 0) {
            if (confirm(`本輪結束！有 ${errorList.length} 個字要複習嗎？`)) {
                currentWordList = [...errorList]; wordIndex = 0; errorList = [];
                loadNextWord();
            } else { endGame(); }
        } else { endGame(); }
    }

    function endGame() {
        isGameActive = false;
        document.getElementById('hint-display').textContent = '👏 太厲害了！全部練習完畢！';
        document.getElementById('start-btn').textContent = '再玩一次';
        updateWrongWordCount();
    }

    // --- 錯題本儲存 ---
    function saveWrongWord(data) {
        let book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        if (!book.find(w => w.word === data.word)) {
            book.push(data); localStorage.setItem('wrongWords', JSON.stringify(book));
            updateWrongWordCount();
        }
    }
    function removeWrongWord(text) {
        let book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        book = book.filter(w => w.word !== text);
        localStorage.setItem('wrongWords', JSON.stringify(book));
        updateWrongWordCount();
    }

    // --- 語音系統 (優先找女生) ---
    function readWord(text) {
        synth.cancel();
        const voices = synth.getVoices();
        // 優先順序：美式女聲 > 英式女聲 > 任何英文女聲 > 預設
        const femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Samantha')));
        const utter = new SpeechSynthesisUtterance(text);
        if (femaleVoice) utter.voice = femaleVoice;
        utter.rate = 0.85;
        synth.speak(utter);
    }

    // --- 鍵盤 ---
    function handleKeyClick(l) {
        const target = currentWord.replace(/\s/g, '');
        if (currentSpelling.length < target.length) {
            currentSpelling.push(l);
            document.getElementById(`slot-${currentSpelling.length-1}`).textContent = l;
        }
        document.getElementById('check-btn').disabled = (currentSpelling.length !== target.length);
    }
    function handleDelete() {
        if (currentSpelling.length > 0) {
            document.getElementById(`slot-${currentSpelling.length-1}`).textContent = '';
            currentSpelling.pop();
            document.getElementById('check-btn').disabled = true;
        }
    }

    window.onload = () => {
        const kb = document.getElementById('keyboard');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('button'); b.className = 'key'; b.textContent = l;
            b.onclick = () => handleKeyClick(l); kb.appendChild(b);
        });
        const del = document.createElement('button'); del.id = 'delete-key'; del.className = 'key'; del.textContent = 'DEL';
        del.onclick = handleDelete; kb.appendChild(del);
        updateWrongWordCount();
        // 預熱語音
        synth.getVoices();
    };
</script>
</body>
</html>
